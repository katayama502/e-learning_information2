[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Firebaseのクライアント設定（NEXT_PUBLIC_*）はブラウザに公開される前提の値。
  # Netlifyのシークレットスキャンが誤検知してビルドを止めるため、公開キーのみ除外する。
  # ※ サーバー専用の FIREBASE_PRIVATE_KEY / FIREBASE_CLIENT_EMAIL は絶対に含めない。
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 全ページ: ブラウザキャッシュを有効化
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# 静的アセット: 長期キャッシュ
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# /joho2 配下: Pyodide(WASM)に必要な COOP/COEP ヘッダー
[[headers]]
  for = "/joho2"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"

[[headers]]
  for = "/joho2/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"
