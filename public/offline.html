<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ehime Base - オフライン</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
  .container { max-width: 400px; }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 20px; margin-bottom: 8px; }
  p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
  button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
  button:active { background: #2563eb; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">📡</div>
  <h1>オフラインです</h1>
  <p>インターネット接続がありません。接続を確認して、もう一度お試しください。</p>
  <button onclick="location.reload()">再読み込み</button>
</div>
</body>
</html>
