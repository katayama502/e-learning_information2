<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A365D"/>
      <stop offset="100%" style="stop-color:#2D4A7A"/>
    </linearGradient>
    <linearGradient id="bubble1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3E8"/>
      <stop offset="100%" style="stop-color:#5BC0D8"/>
    </linearGradient>
    <linearGradient id="bubble2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#E8F4F8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Large speech bubble (left) -->
  <path d="M100 150 C100 120, 130 100, 160 100 L300 100 C330 100, 350 120, 350 150 L350 240 C350 270, 330 290, 300 290 L200 290 L150 340 L160 290 L160 290 C130 290, 100 270, 100 240 Z" fill="url(#bubble1)" opacity="0.95"/>
  <!-- Three dots in large bubble -->
  <circle cx="175" cy="195" r="16" fill="#1A365D" opacity="0.7"/>
  <circle cx="225" cy="195" r="16" fill="#1A365D" opacity="0.7"/>
  <circle cx="275" cy="195" r="16" fill="#1A365D" opacity="0.7"/>
  <!-- Small speech bubble (right) -->
  <path d="M200 230 C200 205, 225 190, 250 190 L380 190 C405 190, 420 205, 420 230 L420 310 C420 335, 405 350, 380 350 L370 350 L380 395 L320 350 L250 350 C225 350, 200 335, 200 310 Z" fill="url(#bubble2)" opacity="0.95"/>
  <!-- Three lines in small bubble -->
  <rect x="240" y="245" width="140" height="12" rx="6" fill="#1A365D" opacity="0.35"/>
  <rect x="240" y="270" width="110" height="12" rx="6" fill="#1A365D" opacity="0.35"/>
  <rect x="240" y="295" width="80" height="12" rx="6" fill="#1A365D" opacity="0.35"/>
  <!-- Small accent dots (people/community feel) -->
  <circle cx="130" cy="390" r="22" fill="#7DD3E8" opacity="0.5"/>
  <circle cx="180" cy="410" r="16" fill="#5BC0D8" opacity="0.4"/>
  <circle cx="390" cy="130" r="18" fill="#7DD3E8" opacity="0.4"/>
</svg>
